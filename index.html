<script>

// ===============================
// 🔥 CONFIG
// ===============================
const API_LIST = [
  "https://lotto.api.rayriffy.com/latest",
  "https://api.allorigins.win/raw?url=https://lotto.api.rayriffy.com/latest"
];

// fallback (สำรอง)
let data = {
  first:"309612",
  last2:"77",
  front3:["355","108"],
  back3:["868","424"]
};

// ===============================
// 🔥 LOAD DATA PRO VERSION
// ===============================
async function fetchWithTimeout(url, timeout = 5000) {
  return Promise.race([
    fetch(url),
    new Promise((_, reject) =>
      setTimeout(() => reject(new Error("timeout")), timeout)
    )
  ]);
}

async function loadData(){

  // 👉 1. ลองโหลดจาก cache ก่อน
  let cache = localStorage.getItem("lottoData");
  if(cache){
    let c = JSON.parse(cache);
    data = c;
    renderData("แคชล่าสุด");
  }

  // 👉 2. ไล่ยิง API ทีละตัว
  for(let url of API_LIST){
    try{
      const res = await fetchWithTimeout(url);

      if(!res.ok) throw new Error();

      const json = await res.json();
      let d = json.response;

      if(!d) throw new Error();

      data.first = d.prizes.find(p=>p.id===1).number;
      data.last2 = d.runningNumbers.find(x=>x.prize==="เลขท้าย 2 ตัว").number;

      data.front3 = d.runningNumbers
        .filter(x=>x.prize.includes("เลขหน้า"))
        .map(x=>x.number);

      data.back3 = d.runningNumbers
        .filter(x=>x.prize.includes("เลขท้าย 3 ตัว"))
        .map(x=>x.number);

      // 👉 save cache
      localStorage.setItem("lottoData", JSON.stringify(data));

      renderData(d.date);
      return;

    }catch(e){
      console.log("API ล้ม:", url);
    }
  }

  // 👉 3. ถ้าล้มหมด
  renderData("งวดล่าสุด (fallback)");
}

// ===============================
// 🎯 RENDER
// ===============================
function renderData(dateText){
  document.getElementById("date").innerText = dateText;
  document.getElementById("first").innerText = data.first;
  document.getElementById("last2").innerText = data.last2;
  document.getElementById("front3").innerText = data.front3.join(" , ");
  document.getElementById("back3").innerText = data.back3.join(" , ");
}

// ===============================
// 🔍 CHECK
// ===============================
function check(){
  let num=document.getElementById("num").value;
  let result=document.getElementById("result");

  if(!/^\d+$/.test(num)){
    result.innerText="⚠️ กรอกตัวเลขเท่านั้น";
    return;
  }

  if(num.length<2||num.length>6){
    result.innerText="⚠️ กรอก 2-6 หลัก";
    return;
  }

  if(num.length===6 && num===data.first){
    result.innerText="🎉 ถูกรางวัลที่ 1";
  }
  else if(num.slice(-2)===data.last2){
    result.innerText="🎊 ถูกเลขท้าย 2 ตัว";
  }
  else if(data.front3.includes(num.slice(-3))){
    result.innerText="🎉 ถูกเลขหน้า 3 ตัว";
  }
  else if(data.back3.includes(num.slice(-3))){
    result.innerText="🎉 ถูกเลขท้าย 3 ตัว";
  }
  else{
    result.innerText="❌ ไม่ถูกรางวัล";
  }
}

// ===============================
loadData();
// ===============================

</script>
