<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>ตรวจหวย PRO MAX</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
margin:0;
font-family:sans-serif;
background:#0f2a5a;
color:#fff;
transition:0.5s;
}

.navbar{
background:#000;
padding:15px;
font-weight:bold;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:#fff;
color:#000;
padding:20px;
border-radius:12px;
margin-bottom:20px;
}

.big{
font-size:40px;
color:red;
text-align:center;
}

input{
padding:10px;
width:60%;
border-radius:8px;
border:1px solid #ccc;
}

button{
padding:10px 20px;
background:red;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

button:hover{background:#b71c1c}
</style>
</head>

<body>

<div class="navbar">🎯 ตรวจหวย PRO MAX</div>

<div class="container">

<div class="card">
<h3 id="date">กำลังโหลด...</h3>
<div id="first" class="big">------</div>
<p>หน้า 3 ตัว: <span id="front3">---</span></p>
<p>ท้าย 3 ตัว: <span id="back3">---</span></p>
<p>ท้าย 2 ตัว: <span id="last2">--</span></p>
</div>

<div class="card">
<input id="num" placeholder="กรอกเลข">
<button onclick="check()">ตรวจ</button>
<p id="result"></p>
</div>

</div>

<audio id="boom" src="https://assets.mixkit.co/sfx/preview/mixkit-explosion-impact-1684.mp3"></audio>

<script>

// fallback
let data={
first:"309612",
last2:"77",
front3:["355","108"],
back3:["868","424"]
};

// render
function render(date){
document.getElementById("date").innerText=date;
document.getElementById("first").innerText=data.first;
document.getElementById("front3").innerText=data.front3.join(",");
document.getElementById("back3").innerText=data.back3.join(",");
document.getElementById("last2").innerText=data.last2;
}

// โหลด API
async function loadData(){
try{
let res=await fetch("https://lotto.api.rayriffy.com/latest");
let json=await res.json();

let d=json.response;

data.first=d.prizes.find(p=>p.id===1)?.number||data.first;
data.last2=d.runningNumbers.find(x=>x.prize==="เลขท้าย 2 ตัว")?.number||data.last2;
data.front3=d.runningNumbers.filter(x=>x.prize.includes("เลขหน้า")).map(x=>x.number)||data.front3;
data.back3=d.runningNumbers.filter(x=>x.prize.includes("เลขท้าย 3 ตัว")).map(x=>x.number)||data.back3;

render(d.date);

}catch(e){
render("งวดล่าสุด");
}
}

loadData();

// 🎆 เอฟเฟกต์รวม
function megaWinEffect(){

// เปลี่ยนธีม
document.body.style.background = "radial-gradient(circle,#1a0033,#000)";

// สร้าง canvas
let canvas = document.createElement("canvas");
let ctx = canvas.getContext("2d");

canvas.style.position = "fixed";
canvas.style.top = 0;
canvas.style.left = 0;
canvas.style.width = "100%";
canvas.style.height = "100%";
canvas.style.zIndex = 9999;

document.body.appendChild(canvas);

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// 🚀 พลุ (ยิงขึ้น)
let rockets = [];
let particles = [];

// ยิงหลายลูก
for(let i=0;i<5;i++){
  rockets.push({
    x: Math.random()*canvas.width,
    y: canvas.height,
    targetY: Math.random()*canvas.height/2,
    speed: 6 + Math.random()*2,
    exploded:false
  });
}

function explode(x,y){

  let colors = ["#ff3b3b","#ffd93b","#3bffae","#3bc9ff","#ff3bf0"];

  for(let i=0;i<80;i++){
    particles.push({
      x:x,
      y:y,
      angle: Math.random()*Math.PI*2,
      speed: Math.random()*4+2,
      life: 80,
      color: colors[Math.floor(Math.random()*colors.length)]
    });
  }
}

function animate(){

  ctx.fillStyle = "rgba(0,0,0,0.2)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // 🚀 ยิงขึ้น
  rockets.forEach(r=>{
    if(!r.exploded){
      r.y -= r.speed;

      // วาดเส้นพุ่ง
      ctx.beginPath();
      ctx.arc(r.x, r.y, 3, 0, Math.PI*2);
      ctx.fillStyle = "#fff";
      ctx.fill();

      if(r.y <= r.targetY){
        r.exploded = true;
        explode(r.x, r.y);
      }
    }
  });

  // 💥 ระเบิด
  particles.forEach(p=>{
    p.x += Math.cos(p.angle)*p.speed;
    p.y += Math.sin(p.angle)*p.speed;
    p.life--;

    ctx.beginPath();
    ctx.arc(p.x, p.y, 2, 0, Math.PI*2);
    ctx.fillStyle = p.color;
    ctx.fill();
  });

  particles = particles.filter(p=>p.life>0);

  requestAnimationFrame(animate);
}

animate();

// เสียง
let audio = document.getElementById("boom");
if(audio) audio.play();

// ลบเอฟเฟกต์
setTimeout(()=>{
  canvas.remove();
  document.body.style.background="#0f2a5a";
},3000);
}
