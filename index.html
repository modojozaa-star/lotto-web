<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>ตรวจหวย 888</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
margin:0;
font-family:sans-serif;
background:#0f2a5a;
color:#fff;
}

.navbar{
background:#000;
padding:15px;
font-weight:bold;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:#fff;
color:#000;
padding:20px;
border-radius:12px;
margin-bottom:20px;
}

.big{
font-size:42px;
color:red;
text-align:center;
font-weight:bold;
}

input{
padding:10px;
width:60%;
border-radius:8px;
border:1px solid #ccc;
}

button{
padding:10px 20px;
background:red;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

#result{
margin-top:15px;
font-size:28px;
font-weight:bold;
text-align:center;
}

/* จอสั่น */
.shake{
animation:shake 0.3s;
}

@keyframes shake{
0%{transform:translate(0)}
25%{transform:translate(6px,-6px)}
50%{transform:translate(-6px,6px)}
75%{transform:translate(6px,6px)}
100%{transform:translate(0)}
}
</style>
</head>

<body>

<div class="navbar">🎯 ตรวจหวย 888</div>

<div class="container">

<div class="card">
<h3 id="date">งวดล่าสุด</h3>
<div id="first" class="big">309612</div>

<p>หน้า 3 ตัว: <span id="front3">355,108</span></p>
<p>ท้าย 3 ตัว: <span id="back3">868,424</span></p>
<p>ท้าย 2 ตัว: <span id="last2">77</span></p>
</div>

<div class="card">
<input id="num" placeholder="กรอกเลข 2-6 หลัก">
<button onclick="check()">ตรวจ</button>
<p id="result"></p>
</div>

</div>

<audio id="winSound" src="https://assets.mixkit.co/sfx/preview/mixkit-winning-chimes-2015.mp3"></audio>
<audio id="loseSound" src="https://assets.mixkit.co/sfx/preview/mixkit-arcade-retro-game-over-213.mp3"></audio>

<script>

// 🔹 fallback กัน API ล่ม
let data={
first:"309612",
last2:"77",
front3:["355","108"],
back3:["868","424"]
};

function render(date){
document.getElementById("date").innerText=date;
document.getElementById("first").innerText=data.first;
document.getElementById("front3").innerText=data.front3.join(",");
document.getElementById("back3").innerText=data.back3.join(",");
document.getElementById("last2").innerText=data.last2;
}

// 🔹 โหลด API จริง
async function loadData(){
try{
let res=await fetch("https://lotto.api.rayriffy.com/latest");
let json=await res.json();
let d=json.response;

data.first=d.prizes.find(p=>p.id===1)?.number||data.first;
data.last2=d.runningNumbers.find(x=>x.prize==="เลขท้าย 2 ตัว")?.number||data.last2;
data.front3=d.runningNumbers.filter(x=>x.prize.includes("เลขหน้า")).map(x=>x.number)||data.front3;
data.back3=d.runningNumbers.filter(x=>x.prize.includes("เลขท้าย 3 ตัว")).map(x=>x.number)||data.back3;

render(d.date);

}catch{
render("งวดล่าสุด");
}
}

loadData();


// 🎆 เอฟเฟคชนะ (พลุ)
function winEffect(){

let canvas=document.createElement("canvas");
let ctx=canvas.getContext("2d");

canvas.style.position="fixed";
canvas.style.top=0;
canvas.style.left=0;
canvas.style.width="100%";
canvas.style.height="100%";
canvas.style.zIndex=1;
canvas.style.pointerEvents="none";

document.body.appendChild(canvas);

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];

function fire(){
let x=Math.random()*canvas.width;
let y=Math.random()*canvas.height*0.5;

for(let i=0;i<100;i++){
particles.push({
x,y,
angle:Math.random()*Math.PI*2,
speed:Math.random()*5+2,
life:80,
color:`hsl(${Math.random()*360},100%,50%)`
});
}
}

for(let i=0;i<5;i++){
setTimeout(fire,i*250);
}

function animate(){
ctx.fillStyle="rgba(15,42,90,0.2)";
ctx.fillRect(0,0,canvas.width,canvas.height);

particles.forEach(p=>{
p.x+=Math.cos(p.angle)*p.speed;
p.y+=Math.sin(p.angle)*p.speed;
p.life--;

ctx.beginPath();
ctx.arc(p.x,p.y,2,0,Math.PI*2);
ctx.fillStyle=p.color;
ctx.fill();
});

particles=particles.filter(p=>p.life>0);

if(particles.length>0) requestAnimationFrame(animate);
}

animate();

document.getElementById("winSound").play();
document.body.classList.add("shake");
setTimeout(()=>document.body.classList.remove("shake"),500);

setTimeout(()=>canvas.remove(),2500);
}


// 💥 เอฟเฟคแพ้
function loseEffect(){

let canvas=document.createElement("canvas");
let ctx=canvas.getContext("2d");

canvas.style.position="fixed";
canvas.style.top=0;
canvas.style.left=0;
canvas.style.width="100%";
canvas.style.height="100%";
canvas.style.zIndex=1;
canvas.style.pointerEvents="none";

document.body.appendChild(canvas);

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];

let x=canvas.width/2;
let y=canvas.height/2;

for(let i=0;i<120;i++){
particles.push({
x,y,
angle:Math.random()*Math.PI*2,
speed:Math.random()*6+3,
life:70,
color:["#ff0000","#ff3b3b","#ff8800","#ffaa00"][Math.floor(Math.random()*4)]
});
}

function animate(){
ctx.fillStyle="rgba(15,42,90,0.3)";
ctx.fillRect(0,0,canvas.width,canvas.height);

particles.forEach(p=>{
p.x+=Math.cos(p.angle)*p.speed;
p.y+=Math.sin(p.angle)*p.speed;
p.life--;

ctx.beginPath();
ctx.arc(p.x,p.y,3,0,Math.PI*2);
ctx.fillStyle=p.color;
ctx.fill();
});

particles=particles.filter(p=>p.life>0);

if(particles.length>0) requestAnimationFrame(animate);
}

animate();

document.getElementById("loseSound").play();
document.body.classList.add("shake");
setTimeout(()=>document.body.classList.remove("shake"),600);

setTimeout(()=>canvas.remove(),2000);
}


// 🔍 ตรวจหวย
function check(){

let num=document.getElementById("num").value.trim();
let result=document.getElementById("result");

if(!num){
result.innerText="กรอกเลขก่อน";
return;
}

if(num.length<2 || num.length>6){
result.innerText="กรอก 2-6 หลัก";
return;
}

if(num===data.first){
result.innerText="🎉 เลี้ยงด้วยน๊าา";
winEffect();
}
else if(num.slice(-2)===data.last2){
result.innerText="🎊 ถูกเลขท้าย 2 ตัว";
winEffect();
}
else if(data.front3.includes(num.slice(-3))){
result.innerText="🎉 ถูกเลขหน้า 3 ตัว";
winEffect();
}
else if(data.back3.includes(num.slice(-3))){
result.innerText="🎉 ถูกเลขท้าย 3 ตัว";
winEffect();
}
else{
result.innerText="😏 สมน้ำหน้า กินมาม่าไปก่อน";
loseEffect();
}
}

render("งวดล่าสุด");

</script>

</body>
</html>
