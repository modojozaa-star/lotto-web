<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>ตรวจหวย PRO MAX</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
margin:0;
font-family:sans-serif;
background:#0f2a5a;
color:#fff;
transition:0.5s;
}

.navbar{
background:#000;
padding:15px;
font-weight:bold;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:#fff;
color:#000;
padding:20px;
border-radius:12px;
margin-bottom:20px;
}

.big{
font-size:40px;
color:red;
text-align:center;
}

input{
padding:10px;
width:60%;
border-radius:8px;
border:1px solid #ccc;
}

button{
padding:10px 20px;
background:red;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

button:hover{background:#b71c1c}
</style>
</head>

<body>

<div class="navbar">🎯 ตรวจหวย PRO MAX</div>

<div class="container">

<div class="card">
<h3 id="date">กำลังโหลด...</h3>
<div id="first" class="big">------</div>
<p>หน้า 3 ตัว: <span id="front3">---</span></p>
<p>ท้าย 3 ตัว: <span id="back3">---</span></p>
<p>ท้าย 2 ตัว: <span id="last2">--</span></p>
</div>

<div class="card">
<input id="num" placeholder="กรอกเลข">
<button onclick="check()">ตรวจ</button>
<p id="result"></p>
</div>

</div>

<audio id="boom" src="https://assets.mixkit.co/sfx/preview/mixkit-explosion-impact-1684.mp3"></audio>

<script>

// fallback
let data={
first:"309612",
last2:"77",
front3:["355","108"],
back3:["868","424"]
};

// render
function render(date){
document.getElementById("date").innerText=date;
document.getElementById("first").innerText=data.first;
document.getElementById("front3").innerText=data.front3.join(",");
document.getElementById("back3").innerText=data.back3.join(",");
document.getElementById("last2").innerText=data.last2;
}

// โหลด API
async function loadData(){
try{
let res=await fetch("https://lotto.api.rayriffy.com/latest");
let json=await res.json();

let d=json.response;

data.first=d.prizes.find(p=>p.id===1)?.number||data.first;
data.last2=d.runningNumbers.find(x=>x.prize==="เลขท้าย 2 ตัว")?.number||data.last2;
data.front3=d.runningNumbers.filter(x=>x.prize.includes("เลขหน้า")).map(x=>x.number)||data.front3;
data.back3=d.runningNumbers.filter(x=>x.prize.includes("เลขท้าย 3 ตัว")).map(x=>x.number)||data.back3;

render(d.date);

}catch(e){
render("งวดล่าสุด");
}
}

loadData();

// 🎆 เอฟเฟกต์รวม
function megaWinEffect(){

// เปลี่ยนธีม
document.body.style.background="linear-gradient(45deg,#ff0000,#ffcc00,#00ffcc,#ff00ff)";

// canvas
let canvas=document.createElement("canvas");
let ctx=canvas.getContext("2d");

canvas.style.position="fixed";
canvas.style.top=0;
canvas.style.left=0;
canvas.style.width="100%";
canvas.style.height="100%";
canvas.style.zIndex=9999;

document.body.appendChild(canvas);

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];

// 💥 พลุ
for(let i=0;i<150;i++){
particles.push({
x:canvas.width/2,
y:canvas.height/2,
speed:Math.random()*6+2,
angle:Math.random()*Math.PI*2,
life:100,
color:`hsl(${Math.random()*360},100%,50%)`
});
}

// 💸 เงินโปรย
for(let i=0;i<50;i++){
particles.push({
x:Math.random()*canvas.width,
y:-20,
vy:Math.random()*4+2,
money:true,
life:200
});
}

function animate(){

ctx.fillStyle="rgba(0,0,0,0.2)";
ctx.fillRect(0,0,canvas.width,canvas.height);

particles.forEach(p=>{

if(p.money){
p.y+=p.vy;
ctx.fillStyle="#00ff66";
ctx.fillRect(p.x,p.y,10,6);
}else{
p.x+=Math.cos(p.angle)*p.speed;
p.y+=Math.sin(p.angle)*p.speed;
p.life--;

ctx.beginPath();
ctx.arc(p.x,p.y,2,0,Math.PI*2);
ctx.fillStyle=p.color;
ctx.fill();
}
});

requestAnimationFrame(animate);
}

animate();

// เสียง
document.getElementById("boom").play();

// ลบเอฟเฟกต์
setTimeout(()=>{
canvas.remove();
document.body.style.background="#0f2a5a";
},3000);
}

// 😈 แพ้ (สมน้ำหน้า)
function loseEffect(){

let div=document.createElement("div");

div.innerHTML="😂";
div.style.position="fixed";
div.style.top="50%";
div.style.left="50%";
div.style.transform="translate(-50%,-50%)";
div.style.fontSize="120px";
div.style.zIndex=9999;

document.body.appendChild(div);

setTimeout(()=>div.remove(),2000);
}

// ตรวจหวย
function check(){

let num=document.getElementById("num").value;
let result=document.getElementById("result");

if(!num){
result.innerText="กรอกเลขก่อน";
return;
}

if(num===data.first){
result.innerText="🎉 รางวัลที่ 1";
megaWinEffect();
}
else if(num.slice(-2)===data.last2){
result.innerText="🎊 เลขท้าย 2 ตัว";
megaWinEffect();
}
else if(data.front3.includes(num.slice(-3))){
result.innerText="🎉 หน้า 3 ตัว";
megaWinEffect();
}
else if(data.back3.includes(num.slice(-3))){
result.innerText="🎉 ท้าย 3 ตัว";
megaWinEffect();
}
else{
result.innerText="❌ ไม่ถูกรางวัล";
loseEffect();
}

}

</script>

</body>
</html>
