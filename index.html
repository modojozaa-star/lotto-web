<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ตรวจหวย</title>
<style>
body{font-family:sans-serif;text-align:center;background:#f5f5f5;}
.box{background:white;padding:20px;border-radius:12px;
max-width:400px;margin:50px auto;box-shadow:0 4px 10px rgba(0,0,0,0.1);}
input{padding:10px;width:80%;border-radius:8px;border:1px solid #ccc;}
button{padding:10px 20px;background:#d32f2f;color:white;border:none;border-radius:8px;}
</style>
</head>

<body>
<div class="box">
<h2>🍀 ตรวจหวยล่าสุด</h2>
<input id="num" placeholder="กรอกเลข 6 หลัก"><br><br>
<button onclick="check()">ตรวจ</button>
<p id="result"></p>
</div>

<script>
let data = {};

async function loadData() {
  try {
    const res = await fetch("https://lotto.api.rayriffy.com/latest");
    const json = await res.json();

    data.first = json.response.prizes[0].number;
    data.last2 = json.response.runningNumbers.find(x => x.prize === "เลขท้าย 2 ตัว").number;
    data.last3 = json.response.runningNumbers.filter(x => x.prize.includes("3 ตัว")).map(x => x.number);

  } catch (e) {
    console.log("โหลดไม่ได้", e);
  }
}

loadData();

function check(){
  let num = document.getElementById("num").value;

  if(num.length !== 6){
    result.innerHTML = "⚠️ กรุณากรอก 6 หลัก";
    return;
  }

  if(num === data.first){
    result.innerHTML = "🎉 ถูกรางวัลที่ 1";
  } 
  else if(num.slice(-2) === data.last2){
    result.innerHTML = "🎊 ถูกเลขท้าย 2 ตัว";
  }
  else if(data.last3.includes(num.slice(-3))){
    result.innerHTML = "🎉 ถูกเลขท้าย 3 ตัว";
  }
  else{
    result.innerHTML = "❌ ไม่ถูกรางวัล";
  }
}
</script>

</body>
</html>
