<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>ตรวจหวย PRO MAX</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
margin:0;
font-family:sans-serif;
background:#eef1f4;
}

.navbar{
background:#111;
color:#fff;
padding:15px;
font-weight:bold;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
position:relative;
z-index:2; /* 🔥 UI อยู่บนสุด */
}

.card{
background:#fff;
padding:25px;
border-radius:16px;
margin-bottom:20px;
box-shadow:0 6px 20px rgba(0,0,0,0.08);
}

.big{
font-size:48px;
color:#ff2d2d;
font-weight:bold;
text-align:center;
}

input{
padding:12px;
width:65%;
border-radius:10px;
border:1px solid #ccc;
font-size:16px;
}

button{
padding:12px 22px;
background:#e60000;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

#result{
margin-top:20px;
font-size:34px;
font-weight:bold;
text-align:center;
padding:15px;
border-radius:12px;
background:#ffffffcc; /* 🔥 กันเอฟเฟกต์ทับ */
}

.win{color:#00c853;}
.lose{color:#d50000;}

/* 🎆 layer เอฟเฟกต์ */
#effectCanvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:1; /* 🔥 อยู่หลัง UI */
pointer-events:none;
}
</style>
</head>

<body>

<div class="navbar">🎯 ตรวจหวย PRO MAX</div>

<canvas id="effectCanvas"></canvas>

<div class="container">

<div class="card">
<h3 id="date">งวดล่าสุด</h3>
<div id="first" class="big">------</div>
<p>หน้า 3 ตัว: <span id="front3"></span></p>
<p>ท้าย 3 ตัว: <span id="back3"></span></p>
<p>ท้าย 2 ตัว: <span id="last2"></span></p>
</div>

<div class="card">
<input id="num" placeholder="กรอกเลข">
<button onclick="check()">ตรวจ</button>
<p id="result"></p>
</div>

</div>

<script>

// fallback
let data={
first:"309612",
last2:"77",
front3:["355","108"],
back3:["868","424"]
};

function render(date){
dateEl.innerText=date;
first.innerText=data.first;
front3.innerText=data.front3.join(",");
back3.innerText=data.back3.join(",");
last2.innerText=data.last2;
}

render("งวดล่าสุด");

// โหลด API
async function loadData(){
try{
let res=await fetch("https://lotto.api.rayriffy.com/latest");
let json=await res.json();
let d=json.response;

data.first=d.prizes.find(p=>p.id===1)?.number||data.first;
data.last2=d.runningNumbers.find(x=>x.prize==="เลขท้าย 2 ตัว")?.number||data.last2;
data.front3=d.runningNumbers.filter(x=>x.prize.includes("เลขหน้า")).map(x=>x.number)||data.front3;
data.back3=d.runningNumbers.filter(x=>x.prize.includes("เลขท้าย 3 ตัว")).map(x=>x.number)||data.back3;

render(d.date);
}catch(e){}
}
loadData();

// 🎆 เอฟเฟกต์ (อยู่หลัง)
function megaWinEffect(){

let canvas=document.getElementById("effectCanvas");
let ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];

// สร้างพลุ
for(let i=0;i<150;i++){
particles.push({
x:canvas.width/2,
y:canvas.height/2,
angle:Math.random()*Math.PI*2,
speed:Math.random()*5+2,
life:80,
color:`hsl(${Math.random()*360},100%,50%)`
});
}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height);

particles.forEach(p=>{
p.x+=Math.cos(p.angle)*p.speed;
p.y+=Math.sin(p.angle)*p.speed;
p.life--;

ctx.beginPath();
ctx.arc(p.x,p.y,2,0,Math.PI*2);
ctx.fillStyle=p.color;
ctx.fill();
});

particles=particles.filter(p=>p.life>0);

if(particles.length>0){
requestAnimationFrame(animate);
}
}

animate();
}

// ตรวจหวย
function check(){

let num=numEl.value;
let result=resultEl;

if(!num){
result.innerText="กรอกเลขก่อน";
return;
}

if(
num===data.first ||
num.slice(-2)===data.last2 ||
data.front3.includes(num.slice(-3)) ||
data.back3.includes(num.slice(-3))
){
result.className="win";
result.innerText="🎉 เลี้ยงด้วยน๊าา 🎉";
megaWinEffect();
}
else{
result.className="lose";
result.innerText="😂 สมน้ำหน้า กินมาม่าไปก่อน 😂";
}

}
</script>

</body>
</html>
