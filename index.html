<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>ตรวจหวย + ดวงรายวัน</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body{
  font-family:'Prompt', sans-serif;
  margin:0;
  background:linear-gradient(135deg,#1e3c72,#2a5298);
  color:#333;
}

/* 🔝 Navbar */
.navbar{
  background:#111;
  color:white;
  padding:15px 30px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.navbar h1{
  margin:0;
  font-size:20px;
}

/* Layout */
.container{
  max-width:1100px;
  margin:auto;
  padding:20px;
  display:grid;
  grid-template-columns:2fr 1fr;
  gap:20px;
}

/* กล่อง */
.card{
  background:white;
  border-radius:15px;
  padding:20px;
  box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

/* หวย */
.big{
  font-size:42px;
  color:#e53935;
  font-weight:bold;
}

.row{
  display:flex;
  justify-content:space-around;
  margin-top:15px;
}

/* input */
input, select{
  padding:10px;
  border-radius:8px;
  border:1px solid #ccc;
  width:70%;
}

button{
  padding:10px 20px;
  background:#e53935;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
  margin-top:10px;
}

button:hover{
  background:#b71c1c;
}

/* ดวง */
.horo{
  text-align:center;
}

.horo-box{
  background:linear-gradient(135deg,#ff9a9e,#fad0c4);
  padding:15px;
  border-radius:12px;
  margin-top:10px;
  font-weight:bold;
}

/* Responsive */
@media(max-width:768px){
  .container{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<div class="navbar">
  <h1>📰 เว็บข่าวตรวจหวย</h1>
  <div>ตรวจหวย | ดูดวง</div>
</div>

<div class="container">

  <!-- 🟢 ฝั่งซ้าย -->
  <div>

    <div class="card">
      <h2>🎯 ผลสลากกินแบ่งรัฐบาล</h2>
      <p id="date">กำลังโหลด...</p>

      <div class="big" id="first">------</div>

      <div class="row">
        <div>
          <p>หน้า 3 ตัว</p>
          <p id="front3">---</p>
        </div>

        <div>
          <p>ท้าย 3 ตัว</p>
          <p id="back3">---</p>
        </div>

        <div>
          <p>ท้าย 2 ตัว</p>
          <p id="last2">--</p>
        </div>
      </div>
    </div>

    <div class="card">
      <h3>🍀 ตรวจหวย</h3>
      <input id="num" placeholder="กรอกเลข 2-6 หลัก">
      <br>
      <button onclick="check()">ตรวจ</button>
      <p id="result"></p>
    </div>

  </div>

  <!-- 🔮 ฝั่งขวา -->
  <div class="card horo">
    <h3>🔮 ดวงประจำวัน</h3>

    <select id="day">
      <option>จันทร์</option>
      <option>อังคาร</option>
      <option>พุธ</option>
      <option>พฤหัส</option>
      <option>ศุกร์</option>
      <option>เสาร์</option>
      <option>อาทิตย์</option>
    </select>

    <button onclick="getHoro()">ดูดวง</button>

    <div class="horo-box" id="horo">เลือกวันเพื่อดูดวง</div>
  </div>

</div>

<script>

// 🔮 ดวง (เปลี่ยนทุกวันจริง)
const horoData = {
  "จันทร์":["มีโชคลาภ","ระวังคำพูด","การเงินดี","ได้ข่าวดี","มีคนช่วย"],
  "อังคาร":["งานก้าวหน้า","เจอเรื่องท้าทาย","เงินเข้า","มีโชค","ระวังสุขภาพ"],
  "พุธ":["ความรักดี","ได้ลาภลอย","งานนิ่ง","เจอเพื่อน","โชคเล็กๆ"],
  "พฤหัส":["ผู้ใหญ่สนับสนุน","เงินมา","มีโชค","งานดี","มีข่าวดี"],
  "ศุกร์":["เสน่ห์แรง","โชคมา","ได้ของ","มีคนคิดถึง","เงินดี"],
  "เสาร์":["เหนื่อยแต่คุ้ม","โชคปลายวัน","มีข่าวดี","เงินเข้า","ระวังเครียด"],
  "อาทิตย์":["สดใส","โชคดี","ได้เดินทาง","เงินมา","มีคนช่วย"]
};

// เปลี่ยนตาม "วันจริง"
function getTodaySeed(){
  const today = new Date().toDateString();
  let hash = 0;
  for(let i=0;i<today.length;i++){
    hash += today.charCodeAt(i);
  }
  return hash;
}

function getHoro(){
  let day = document.getElementById("day").value;
  let seed = getTodaySeed();
  let list = horoData[day];

  let index = seed % list.length;
  document.getElementById("horo").innerText = list[index];
}


// 🎯 หวย
let data = {
  first:"309612",
  last2:"77",
  front3:["355","108"],
  back3:["868","424"]
};

async function loadData(){
  try{
    const res = await fetch("https://lotto.api.rayriffy.com/latest");
    const json = await res.json();

    let d = json.response;

    document.getElementById("date").innerText = d.date;

    data.first = d.prizes.find(p=>p.id===1).number;
    data.last2 = d.runningNumbers.find(x=>x.prize==="เลขท้าย 2 ตัว").number;

    data.front3 = d.runningNumbers.filter(x=>x.prize.includes("เลขหน้า")).map(x=>x.number);
    data.back3 = d.runningNumbers.filter(x=>x.prize.includes("เลขท้าย 3 ตัว")).map(x=>x.number);

    document.getElementById("first").innerText = data.first;
    document.getElementById("last2").innerText = data.last2;
    document.getElementById("front3").innerText = data.front3.join(" , ");
    document.getElementById("back3").innerText = data.back3.join(" , ");

  }catch(e){
    document.getElementById("date").innerText="ใช้ข้อมูลสำรอง";
  }
}

loadData();

function check(){
  let num=document.getElementById("num").value;

  if(num===data.first){
    result.innerText="🎉 รางวัลที่ 1";
  }
  else if(num.slice(-2)===data.last2){
    result.innerText="🎊 เลขท้าย 2 ตัว";
  }
  else if(data.front3.includes(num.slice(-3))){
    result.innerText="🎉 หน้า 3 ตัว";
  }
  else if(data.back3.includes(num.slice(-3))){
    result.innerText="🎉 ท้าย 3 ตัว";
  }
  else{
    result.innerText="❌ ไม่ถูกรางวัล";
  }
}

</script>

</body>
</html>
