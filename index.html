<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>ตรวจหวย + ดวงรายวัน</title>

<style>
body{
  font-family:sans-serif;
  background:#f5f5f5;
  margin:0;
}

/* 🔝 Navbar */
.navbar{
  background:#111;
  color:white;
  padding:15px;
  display:flex;
  justify-content:space-between;
}

/* 🎞️ Slider */
.slider{
  height:200px;
  background:#333;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
}

/* 📦 Layout */
.container{
  max-width:1100px;
  margin:auto;
  padding:20px;
  display:grid;
  grid-template-columns:2fr 1fr;
  gap:20px;
}

/* 🎯 กล่อง */
.box{
  background:white;
  padding:20px;
  border-radius:12px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

/* หวย */
.big{
  font-size:40px;
  color:red;
  font-weight:bold;
}

.row{
  display:flex;
  justify-content:space-around;
}

/* 🔮 ดวง */
.horo{
  text-align:center;
}

select, button, input{
  padding:10px;
  margin:5px;
}

button{
  background:red;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="navbar">
  <div>🎯 เว็บตรวจหวย</div>
  <div>ตรวจหวย | ดวงรายวัน</div>
</div>

<!-- 🎞️ Slider -->
<div class="slider" id="slider">
  ข่าว 1: ตรวจหวยออนไลน์ง่ายๆ
</div>

<div class="container">

  <!-- 🎯 ฝั่งซ้าย -->
  <div>

    <div class="box">
      <h2>ผลสลากกินแบ่งรัฐบาล</h2>
      <p id="date">กำลังโหลด...</p>

      <div class="big" id="first">------</div>

      <div class="row">
        <div>
          <p>หน้า 3 ตัว</p>
          <p id="front3">---</p>
        </div>

        <div>
          <p>ท้าย 3 ตัว</p>
          <p id="back3">---</p>
        </div>

        <div>
          <p>ท้าย 2 ตัว</p>
          <p id="last2">--</p>
        </div>
      </div>
    </div>

    <div class="box">
      <h3>🍀 ตรวจหวย</h3>
      <input id="num" placeholder="กรอกเลข 2-6 หลัก">
      <button onclick="check()">ตรวจ</button>
      <p id="result"></p>
    </div>

  </div>

  <!-- 🔮 ฝั่งขวา -->
  <div class="box horo">
    <h3>🔮 ดูดวงวันนี้</h3>

    <select id="day">
      <option>จันทร์</option>
      <option>อังคาร</option>
      <option>พุธ</option>
      <option>พฤหัส</option>
      <option>ศุกร์</option>
      <option>เสาร์</option>
      <option>อาทิตย์</option>
    </select>

    <button onclick="getHoro()">ดูดวง</button>

    <p id="horo"></p>
  </div>

</div>

<script>

// 🎞️ Slider
let news = [
  "ข่าว 1: ตรวจหวยออนไลน์ง่ายๆ",
  "ข่าว 2: งวดนี้เลขดังมาแรง",
  "ข่าว 3: เทคนิคดูเลขเด็ด"
];
let i=0;
setInterval(()=>{
  i=(i+1)%news.length;
  document.getElementById("slider").innerText = news[i];
},3000);

// 🔮 ดวง
let horoList = [
  "วันนี้โชคลาภเด่นมาก",
  "ระวังการใช้เงิน",
  "มีคนช่วยเหลือ",
  "การงานดีขึ้น",
  "ความรักสดใส",
  "มีโชคจากตัวเลข"
];

function getHoro(){
  let rand = Math.floor(Math.random()*horoList.length);
  document.getElementById("horo").innerText = horoList[rand];
}

// 🎯 หวย
let data = {
  first:"309612",
  last2:"77",
  front3:["355","108"],
  back3:["868","424"]
};

async function loadData(){
  try{
    const res = await fetch("https://api.allorigins.win/raw?url=https://lotto.api.rayriffy.com/latest");
    const json = await res.json();

    let d = json.response;

    document.getElementById("date").innerText = d.date;

    data.first = d.prizes.find(p=>p.id===1).number;
    data.last2 = d.runningNumbers.find(x=>x.prize==="เลขท้าย 2 ตัว").number;

    data.front3 = d.runningNumbers.filter(x=>x.prize.includes("เลขหน้า")).map(x=>x.number);
    data.back3 = d.runningNumbers.filter(x=>x.prize.includes("เลขท้าย")).map(x=>x.number);

    document.getElementById("first").innerText = data.first;
    document.getElementById("last2").innerText = data.last2;
    document.getElementById("front3").innerText = data.front3.join(",");
    document.getElementById("back3").innerText = data.back3.join(",");

  }catch(e){
    document.getElementById("date").innerText="ใช้ข้อมูลสำรอง";
  }
}

loadData();

function check(){
  let num=document.getElementById("num").value;

  if(num===data.first){
    result.innerText="🎉 รางวัลที่ 1";
  }
  else if(num.slice(-2)===data.last2){
    result.innerText="🎊 เลขท้าย 2 ตัว";
  }
  else if(data.front3.includes(num.slice(-3))){
    result.innerText="🎉 หน้า 3 ตัว";
  }
  else if(data.back3.includes(num.slice(-3))){
    result.innerText="🎉 ท้าย 3 ตัว";
  }
  else{
    result.innerText="❌ ไม่ถูกรางวัล";
  }
}

</script>

</body>
</html>
