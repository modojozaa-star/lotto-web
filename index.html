<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>ตรวจหวย PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{font-family:sans-serif;background:#0f1f4b;margin:0;color:#fff}
.navbar{background:#000;padding:15px;font-size:18px}
.container{max-width:900px;margin:auto;padding:20px}
.card{background:#fff;color:#000;padding:20px;border-radius:12px;margin-bottom:20px}
.big{font-size:48px;color:red;text-align:center;font-weight:bold}
button{padding:10px 20px;background:red;color:white;border:none;border-radius:8px;cursor:pointer}
input{padding:10px;width:60%;border-radius:6px;border:1px solid #ccc}
button:hover{background:#b71c1c}
</style>
</head>

<body>

<div class="navbar">🎯 ตรวจหวย PRO</div>

<div class="container">

<div class="card">
<h3 id="date">กำลังโหลด...</h3>
<div id="first" class="big">------</div>
<p>หน้า 3 ตัว: <span id="front3">---</span></p>
<p>ท้าย 3 ตัว: <span id="back3">---</span></p>
<p>ท้าย 2 ตัว: <span id="last2">--</span></p>
</div>

<div class="card">
<input id="num" placeholder="กรอกเลข">
<button onclick="spinCheck()">ตรวจ</button>
<p id="result"></p>
</div>

</div>

<!-- 🔊 เสียง -->
<audio id="winSound" src="https://assets.mixkit.co/sfx/preview/mixkit-winning-chimes-2015.mp3"></audio>
<audio id="loseSound" src="https://assets.mixkit.co/sfx/preview/mixkit-player-losing-or-failing-2042.mp3"></audio>

<script>

// fallback
let data={
first:"309612",
last2:"77",
front3:["355","108"],
back3:["868","424"]
};

// render
function render(date){
document.getElementById("date").innerText=date;
document.getElementById("first").innerText=data.first;
document.getElementById("front3").innerText=data.front3.join(",");
document.getElementById("back3").innerText=data.back3.join(",");
document.getElementById("last2").innerText=data.last2;
}

// แสดงก่อน
render("งวดล่าสุด");

// โหลด API
async function loadData(){
try{
let res=await fetch("https://api.allorigins.win/raw?url=https://lotto.api.rayriffy.com/latest");
let json=await res.json();

let d=json.response;

data.first=d.prizes.find(p=>p.id===1)?.number || data.first;
data.last2=d.runningNumbers.find(x=>x.prize==="เลขท้าย 2 ตัว")?.number || data.last2;
data.front3=d.runningNumbers.filter(x=>x.prize.includes("เลขหน้า")).map(x=>x.number);
data.back3=d.runningNumbers.filter(x=>x.prize.includes("เลขท้าย 3 ตัว")).map(x=>x.number);

render(d.date);

}catch(e){
render("งวดล่าสุด");
}
}

loadData();


// 🎰 หมุนเลข
function spinCheck(){
let display=document.getElementById("first");
let count=0;

let spin=setInterval(()=>{
display.innerText=Math.floor(Math.random()*999999).toString().padStart(6,"0");
count++;

if(count>15){
clearInterval(spin);
display.innerText=data.first;
check();
}
},80);
}


// 🎆 เอฟเฟกต์
function effect(type){

const overlay=document.createElement("div");
overlay.style.position="fixed";
overlay.style.top=0;
overlay.style.left=0;
overlay.style.width="100%";
overlay.style.height="100%";
overlay.style.pointerEvents="none";
overlay.style.zIndex=9999;
document.body.appendChild(overlay);

let emoji = type==="win" ? ["🎉","💰","🔥","🎆","🥳"] : ["😂","😭","💀","❌","🤣"];

for(let i=0;i<120;i++){
let el=document.createElement("div");
el.innerText=emoji[Math.floor(Math.random()*emoji.length)];
el.style.position="absolute";
el.style.fontSize=(Math.random()*40+20)+"px";
el.style.left=Math.random()*100+"%";
el.style.top="-50px";
el.style.transition="all 2s ease-out";

overlay.appendChild(el);

setTimeout(()=>{
el.style.top="100%";
el.style.transform=`rotate(${Math.random()*720}deg)`;
},50);
}

// ลบ
setTimeout(()=>overlay.remove(),2200);
}


// ตรวจหวย
function check(){

let num=document.getElementById("num").value;
let result=document.getElementById("result");

if(!num){
result.innerText="กรอกเลขก่อน";
return;
}

if(num===data.first){
result.innerText="🎉 รางวัลที่ 1";
document.getElementById("winSound").play();
effect("win");
}
else if(num.slice(-2)===data.last2){
result.innerText="🎊 เลขท้าย 2 ตัว";
document.getElementById("winSound").play();
effect("win");
}
else if(data.front3.includes(num.slice(-3))){
result.innerText="🎉 หน้า 3 ตัว";
document.getElementById("winSound").play();
effect("win");
}
else if(data.back3.includes(num.slice(-3))){
result.innerText="🎉 ท้าย 3 ตัว";
document.getElementById("winSound").play();
effect("win");
}
else{
result.innerText="❌ ไม่ถูกรางวัล";
document.getElementById("loseSound").play();
effect("lose");
}

}

</script>

</body>
</html>
